name: Build travel-time matrix (ORS)

on:
  workflow_dispatch:

jobs:
  matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build travel-time matrix
        env:
          ORS_API_KEY: ${{ secrets.ORS_API_KEY }}
          GEOCODED_CSV: data/geocoded.csv
          MATRIX_JSON: data/time_matrix.json
        run: python scripts/build_matrix_ors.py

      - name: Upload matrix artifact
        uses: actions/upload-artifact@v4
        with:
          name: time-matrix
          path: data/time_matrix.json
